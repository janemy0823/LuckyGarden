      #root {
        width: 100%;

        height: 92vh;
        max-height: 850px;
        background: #fff;
        box-shadow: 0 12px 36px rgba(120, 140, 125, 0.15);
        border-radius: 24px;
        overflow: hidden;
        position: relative;
      }
      @keyframes floatY {
        0% {
          transform: translateY(0px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(110px) rotate(360deg);
          opacity: 0;
        }
      }
      @keyframes pulseCute {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      @keyframes gardenWalker {
        0% {
          transform: translate(0, 0) scaleX(1);
        }
        25% {
          transform: translate(90px, -12px) scaleX(1);
        }
        50% {
          transform: translate(190px, 18px) scaleX(-1);
        }
        75% {
          transform: translate(70px, 34px) scaleX(-1);
        }
        100% {
          transform: translate(0, 0) scaleX(1);
        }
      }
      @keyframes gardenFlyer {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        20% {
          transform: translate(80px, -18px) rotate(12deg);
        }
        45% {
          transform: translate(210px, 10px) rotate(-10deg);
        }
        70% {
          transform: translate(120px, 55px) rotate(8deg);
        }
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
      }
      .garden-walker {
        animation: gardenWalker 12s ease-in-out infinite alternate;
        pointer-events: none;
      }
      .garden-flyer {
        animation: gardenFlyer 9s ease-in-out infinite;
        pointer-events: none;
      }
      .particle-flower {
        position: absolute;
        pointer-events: none;
        animation: floatY 6s linear infinite;
      }
      .cute-pulse {
        animation: pulseCute 2s ease-in-out infinite;
      }
    </style>

      function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
      }

      function getSeasonKey() {
        const m = new Date().getMonth() + 1;
        if (m >= 3 && m <= 5) return "spring";
        if (m >= 6 && m <= 8) return "summer";
        if (m >= 9 && m <= 11) return "autumn";
        return "winter";
      }

      function formatDateCN(d = new Date()) {
        const weekdays = [
          "周日",
          "周一",
          "周二",
          "周三",
          "周四",
          "周五",
          "周六",
        ];
        return `${d.getMonth() + 1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
      }

      function calcAge(birthdate) {
        if (!birthdate) return 0;
        const birth = new Date(birthdate);
        const now = new Date();
        let age = now.getFullYear() - birth.getFullYear();
        const monthDiff = now.getMonth() - birth.getMonth();
        if (
          monthDiff < 0 ||
          (monthDiff === 0 && now.getDate() < birth.getDate())
        )
          age--;
        return age;
      }

      function seededHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++)
          hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return hash;
      }

      function pickBySeed(arr, hash, offset) {
        const idx = Math.abs((hash + offset) % arr.length);
        return arr[idx];
      }

      // 每日心情（与运势页共用同一套种子，保持一致）
      function computeDailyMood(profile, todayKey) {
        const seedStr = `${profile.birthdate}-${
          profile.gender || "x"
        }-${todayKey}`;
        const hash = seededHash(seedStr);
        const isJunior = calcAge(profile.birthdate) <= 17;
        const pool = isJunior ? JUNIOR_MOOD_POOL : BOSS_MOOD_POOL;
        const mood = pickBySeed(pool, hash, 88);
        return { ...mood, isJunior, hash };
      }

      function GardenScene({
        plots,

        decor = [],
        onDecorMove = () => {},
      }) {
        const groundRef = useRef(null);
        const [dragId, setDragId] = useState(null);
        const [overridePos, setOverridePos] = useState({});

        const clientToPct = (clientX, clientY) => {
          const rect = groundRef.current.getBoundingClientRect();
          const x = Math.max(
            2,
            Math.min(94, ((clientX - rect.left) / rect.width) * 100)
          );
          const y = Math.max(
            2,
            Math.min(88, ((clientY - rect.top) / rect.height) * 100)
          );
          return { x, y };
        };
        const handlePointerDown = (e, item) => {
          e.currentTarget.setPointerCapture &&
            e.currentTarget.setPointerCapture(e.pointerId);
          setDragId(item.id);
        };
        const handlePointerMove = (e) => {
          if (!dragId || !groundRef.current) return;
          setOverridePos((prev) => ({
            ...prev,
            [dragId]: clientToPct(e.clientX, e.clientY),
          }));
        };
        const finishDrag = () => {
          if (dragId && overridePos[dragId]) {
            onDecorMove(dragId, overridePos[dragId].x, overridePos[dragId].y);
          }
          setDragId(null);
        };

        return (
          <div
            style={{
              background: "#fff",
              borderRadius: "18px",
              overflow: "hidden",
              boxShadow: "0 6px 16px rgba(0,0,0,0.04)",

      function FortuneTab({ profile }) {
        const todayKey = todayStr();

        const currentAge = useMemo(() => {
          if (!profile.birthdate) return 0;
          const birth = new Date(profile.birthdate);
          const now = new Date();
          let age = now.getFullYear() - birth.getFullYear();
          const monthDiff = now.getMonth() - birth.getMonth();
          if (
            monthDiff < 0 ||
            (monthDiff === 0 && now.getDate() < birth.getDate())
          ) {
            age--;
          }
          return age;
        }, [profile.birthdate]);

        const luckData = useMemo(() => {
          const seedStr = `${profile.birthdate}-${
            profile.gender || "x"
          }-${todayKey}`;
          let hash = 0;
          for (let i = 0; i < seedStr.length; i++) {
            hash = seedStr.charCodeAt(i) + ((hash << 5) - hash);
          }
          const getRandItem = (arr, offset) => {
            const idx = Math.abs((hash + offset) % arr.length);
            return arr[idx];
          };

          const fItem = getRandItem(FORTUNE_POOL.fortune, 11);
          const cItem = getRandItem(FORTUNE_POOL.career, 22);
          const sItem = getRandItem(FORTUNE_POOL.study, 77);
          const lItem = getRandItem(FORTUNE_POOL.love, 33);
          const hItem = getRandItem(FORTUNE_POOL.health, 44);

          // 核心逻辑判断：17岁或以下使用父母老师心情池，18岁及以上使用老板池
          const isJunior = currentAge <= 17;
          const targetMoodPool = isJunior ? JUNIOR_MOOD_POOL : BOSS_MOOD_POOL;
          const currentMood = getRandItem(targetMoodPool, 88);

          const totalScore = Math.round(
            (fItem.score +
              cItem.score +
              sItem.score +
              lItem.score +
              hItem.score) /
              5
          );

          const list = [
            { id: "fortune", name: "财富运势 🪙", score: fItem.score },
            {
              id: "career",
              name: isJunior ? "学业/成长运 💼" : "事业发展运 💼",
              score: cItem.score,
            },
            { id: "study", name: "智慧气运 🎓", score: sItem.score },
            { id: "love", name: "萌动桃花运 💖", score: lItem.score },
            { id: "health", name: "健康活力运 🍀", score: hItem.score },
          ];

          list.sort((a, b) => b.score - a.score);

          let bestName = "";
          if (isJunior && list[0].id === "study") {
            bestName = list[1].name;
          } else {
            bestName = list[0].name;
          }

          // 洗牌算法生成 TOTO 6个不重复号码
          const numberPool = Array.from({ length: 49 }, (_, i) => i + 1);
          const selectedTotoNums = [];
          let currentHash = hash;

          for (let i = 0; i < 6; i++) {
            currentHash = (currentHash * 31 + i) % 2147483647;
            const pickIndex = Math.abs(currentHash) % numberPool.length;
            selectedTotoNums.push(numberPool[pickIndex]);
            numberPool.splice(pickIndex, 1);
          }
          selectedTotoNums.sort((a, b) => a - b);
          const totoStrResult = selectedTotoNums.join(", ") + " toto";

            totalScore,
            bestName,
            totoStrResult,

            c: cItem,

            l: lItem,

        const showToast = (msg) => {
          setToast(msg);
          setTimeout(() => setToast(null), 2000);
        };

        // 自动读取 / 保存游戏进度
        useEffect(() => {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            try {
              const loaded = JSON.parse(saved);
              setState({
                ...defaultState,
                ...loaded,
                decor: loaded.decor || [],
                plots: loaded.plots || [],
              });
            } catch (e) {
              console.warn("读取存档失败，使用默认存档", e);
            }
          }
        }, []);

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }, [state]);

        const season = useMemo(() => SEASONS[getSeasonKey()], []);
        const today = todayStr();

        // 每一天第一打卡奖励20金币；每个月第一天额外奖励50金币
        useEffect(() => {
          if (!state.profile || state.lastCheckInDate === today) return;
          const now = new Date();
          const monthlyBonus = now.getDate() === 1 ? 200 : 0;
          const reward = 80 + monthlyBonus;
          setState((prev) => ({
            ...prev,
            coins: prev.coins + reward,
            lastCheckInDate: today,

          showToast(
            monthlyBonus

              : "🎁 今日首次打卡奖励 +80金币！"

        }, [state.profile, state.lastCheckInDate, today]);

        const dailyMood = useMemo(() => {

          if (!regForm.birthdate) {

          const d = new Date(regForm.birthdate);
          const table = [
            [1, 19, "摩羯座"],
            [2, 18, "水瓶座"],
            [3, 20, "双鱼座"],
            [4, 19, "白羊座"],
            [5, 20, "金牛座"],
            [6, 21, "双子座"],
            [7, 22, "巨蟹座"],

            [11, 22, "天蝎座"],
            [12, 21, "射手座"],

          let zodiacW = "摩羯座";
          const m = d.getMonth() + 1,
            day = d.getDate();

            if (m < mm || (m === mm && day <= dd)) {
              zodiacW = name;

          const zodiacs = [

            "鸡",
            "狗",
            "猪",

            "虎",
            "兔",
            "龙",
            "蛇",

            "羊",

          const zodiacC = zodiacs[((d.getFullYear() % 12) + 12) % 12];

          setState({
            profile: {
              nickname: regForm.nickname || "尊贵的小园丁",

              gender: regForm.gender,

                style={{
                  flex: 1,
                  border: "none",
                  background: "none",
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  justifyContent: "center",
                  cursor: "pointer",
                  color: tab === "me" ? "#52b788" : "#999",
                }}
              >
                <span style={{ fontSize: "20px" }}>🧑‍🌾</span>
                <span style={{ fontSize: "11px", marginTop: "2px" }}>我的</span>
              </button>
            </div>

            {pickerPlot !== null && (
              <SeedShopModal
                onPick={(sid) => plantSpecies(pickerPlot, sid)}
                onClose={() => setPickerPlot(null)}
                currentCoins={state.coins}
              />
            )}
            {showBlessing && (
              <BlessingModal
                text={blessingText}
                nickname={state.profile.nickname}
                onClose={closeBlessing}
              />
            )}
            {toast && (
              <div
                style={{
                  position: "absolute",
                  bottom: "80px",
                  left: "50%",
                  transform: "translateX(-50%)",
                  background: "rgba(0,0,0,0.75)",
                  color: "#fff",
                  padding: "8px 16px",
                  borderRadius: "20px",
                  fontSize: "12px",
                  zIndex: 999,
                }}
              >
                {toast}
              </div>
            )}
          </div>
        );
      }

      const defaultState = {
        profile: null,
        coins: STARTING_COINS,
        plots: [],
        decor: [],
        collection: [],
        lastCleanDate: null,
        lastBlessingDate: null,
        lastCheckInDate: null,
      };
      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);
      root.render(<GardenApp />);
    </script>
  </body>
</html>
